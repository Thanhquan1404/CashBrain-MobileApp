services:
  - type: web
    name: cashbrain-api
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn --workers 3 --worker-class sync --timeout 60 --bind 0.0.0.0:$PORT "run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        scope: project
      - key: JWT_SECRET_KEY
        scope: project
      - key: DATABASE_URL
        scope: project
      - key: FINANCE_DATABASE_URL
        scope: project
      - key: CHATBOT_DATABASE_URL
        scope: project
      - key: FLASK_ENV
        value: production
    healthCheckPath: /health
    maxShutdownDelay: 30
    preDeployCommand: |
      python -c "from app import create_app; app = create_app(); \
      with app.app_context(): \
        from app.models import user; \
        from app.income import models as income_models; \
        from app.expense import models as expense_models; \
        from app.chatbot import models as chatbot_models; \
        from app import db; \
        db.create_all()"
