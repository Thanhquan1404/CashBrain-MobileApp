openapi: 3.0.0
info:
  title: CashBrain - Personal Finance Management API
  version: 1.0.0
  description: |
    # CashBrain API Documentation
    
    Comprehensive REST API for personal finance management with AI-powered financial insights powered by Google Gemini.
    
    ## Core Features
    - **User Authentication**: JWT-based token authentication with role-based access control
    - **Expense Tracking**: Create, read, update, delete expenses with categorization and image support
    - **Income Management**: Track multiple income sources with custom categories
    - **AI Financial Advisor**: Intelligent chatbot powered by Google Gemini for financial guidance
    - **Financial Analytics**: Detailed analysis by month, week, and calendar view
    - **Cloud Storage**: Secure expense receipt storage via Cloudinary integration
    
    ## Getting Started
    
    ### Authentication Flow
    1. **Register**: `POST /auth/register` - Create new account
    2. **Login**: `POST /auth/login` - Get JWT tokens
    3. **Use Token**: Include in Authorization header: `Authorization: Bearer {access_token}`
    4. **Refresh**: `POST /auth/refresh` - Refresh expired access token
    
    ### API Endpoints Structure
    - All endpoints require Bearer token (except register/login)
    - Base URL: Production `https://cashbrain-mobileapp.onrender.com/api` or Dev `http://localhost:5000/api`
    - Request/Response format: JSON

servers:
  - url: https://cashbrain-mobileapp.onrender.com/api
    description: Production Server (Render.com)
  - url: http://localhost:5000/api
    description: Development Server (Local)


tags:
  - name: Authentication
    description: User registration, login, profile management, and token refresh
  - name: Expense Management
    description: CRUD operations for expenses and expense categories with image support
  - name: Income Management
    description: Track income and manage custom income categories
  - name: AI Chatbot
    description: Interact with AI financial advisor powered by Google Gemini API
  - name: Financial Analysis
    description: Get comprehensive financial analysis and insights (monthly, weekly, daily)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token required for protected endpoints

  schemas:
    # ---------- Auth ----------
    RegisterRequest:
      type: object
      description: User registration request with credentials
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Unique username (3-50 characters)
          example: "john_doe"
        email:
          type: string
          format: email
          description: Valid email address
          example: "john.doe@example.com"
        password:
          type: string
          minLength: 6
          maxLength: 128
          description: Password (minimum 6 characters)
          example: "securePassword123"

    LoginRequest:
      type: object
      description: User login credentials
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username or email
          example: "john_doe"
        password:
          type: string
          description: User password
          example: "securePassword123"

    AuthResponse:
      type: object
      description: Authentication response with JWT tokens
      properties:
        message:
          type: string
          description: Status message
          example: "Successfully register a new account"
        data:
          type: object
          description: Token data
          properties:
            access_token:
              type: string
              description: JWT access token (expires in ~15 minutes)
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refresh_token:
              type: string
              description: JWT refresh token for getting new access tokens
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            token_type:
              type: string
              enum: [bearer]
              example: "bearer"

    UserProfile:
      type: object
      description: User account profile information
      properties:
        id:
          type: string
          format: ObjectId
          description: Unique user ID (MongoDB ObjectId)
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          description: User's username
          example: "john_doe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john.doe@example.com"
        role:
          type: string
          enum: [user, admin]
          description: User role/permission level
          example: "user"
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp (ISO 8601)
          example: "2025-01-15T10:30:00Z"

    # ---------- Expense ----------  
    ExpenseCategoryGroup:
      type: object
      description: Group of related expense categories
      properties:
        id:
          type: string
          format: ObjectId
          description: Category group ID
          example: "507f1f77bcf86cd799439001"
        title:
          type: string
          description: Group name/title
          example: "Food & Dining"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Primary color (hex format)
          example: "#FF6B6B"
        bgColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Background color (hex format)
          example: "#FFE5E5"
        categories:
          type: array
          description: List of individual categories in this group
          items:
            type: object
            properties:
              id:
                type: string
                format: ObjectId
                example: "507f1f77bcf86cd799439002"
              label:
                type: string
                description: Category name
                example: "Restaurant"
              icon:
                type: string
                description: Icon identifier/emoji
                example: "🍽️"
              color:
                type: string
                pattern: "^#[0-9A-Fa-f]{6}$"
                description: Category color
                example: "#FF6B6B"

    ExpenseInput:
      type: object
      description: Request payload for creating a new expense
      required:
        - category_id
        - amount
        - date
      properties:
        category_id:
          type: string
          format: ObjectId
          description: ID of the expense category
          example: "507f1f77bcf86cd799439002"
        amount:
          type: number
          format: double
          minimum: 0.01
          exclusiveMinimum: true
          description: Expense amount (must be > 0)
          example: 35.50
        date:
          type: string
          format: date
          description: Date of expense (YYYY-MM-DD format)
          example: "2025-03-20"
        note:
          type: string
          maxLength: 500
          nullable: true
          description: Optional note/description
          example: "Lunch with team at the new Italian restaurant"

    ExpenseOutput:
      type: object
      description: Complete expense record returned by API
      properties:
        id:
          type: string
          format: ObjectId
          description: Unique expense ID
          example: "507f1f77bcf86cd799439013"
        user_id:
          type: string
          format: ObjectId
          description: ID of the user who owns this expense
          example: "507f1f77bcf86cd799439011"
        category_id:
          type: string
          format: ObjectId
          description: Category ID for this expense
          example: "507f1f77bcf86cd799439002"
        category_name:
          type: string
          description: Category name for display
          example: "Restaurant"
        amount:
          type: number
          format: double
          description: Expense amount
          example: 35.50
        date:
          type: string
          format: date
          description: Expense date
          example: "2025-03-20"
        note:
          type: string
          nullable: true
          description: Expense note
          example: "Lunch with team"
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2025-03-20T12:30:00Z"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to Cloudinary image (if attached)
          example: "https://res.cloudinary.com/cashbrain/image/upload/v1234567890/expense-123.jpg"

    # ---------- Income ----------
    IncomeCategory:
      type: object
      description: Income source category
      properties:
        id:
          type: string
          format: ObjectId
          description: Category ID
          example: "507f1f77bcf86cd799439020"
        name:
          type: string
          description: Category name (e.g., Salary, Freelance, Bonus)
          example: "Salary"
        description:
          type: string
          nullable: true
          description: Optional description
          example: "Monthly salary from employment"

    IncomeCategoryRequest:
      type: object
      description: Request for creating/updating income category
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Category name
          example: "Freelance Work"
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Optional category description
          example: "Income from freelance projects and consulting"

    IncomeInput:
      type: object
      description: Request payload for creating income record
      required:
        - amount
        - date
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          exclusiveMinimum: true
          description: Income amount
          example: 1500.00
        date:
          type: string
          format: date
          description: Income date (YYYY-MM-DD)
          example: "2025-03-15"
        note:
          type: string
          maxLength: 500
          nullable: true
          description: Optional note
          example: "Monthly salary payment"

    IncomeOutput:
      type: object
      description: Complete income record
      properties:
        id:
          type: string
          format: ObjectId
          example: "507f1f77bcf86cd799439021"
        user_id:
          type: string
          format: ObjectId
          description: User who owns this income
          example: "507f1f77bcf86cd799439011"
        amount:
          type: number
          format: double
          example: 1500.00
        date:
          type: string
          format: date
          example: "2025-03-15"
        note:
          type: string
          nullable: true
          example: "Monthly salary"
        created_at:
          type: string
          format: date-time
          example: "2025-03-15T08:00:00Z"

    # ---------- Chatbot ----------
    ChatMessageRequest:
      type: object
      description: Request to send message to AI financial advisor
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
          description: Question or statement for the AI advisor
          example: "How much did I spend on food last month?"
        months:
          type: integer
          minimum: 1
          maximum: 12
          default: 3
          description: Number of months to analyze for context
          example: 3

    ChatMessageResponse:
      type: object
      description: AI advisor's response with financial analysis
      properties:
        status:
          type: string
          enum: [success]
          example: "success"
        user_message:
          type: string
          example: "How much did I spend on food last month?"
        ai_response:
          type: string
          description: AI-generated response with analysis
          example: "Based on your recent transactions, you spent $450 on dining out last month. This represents 15% of your total expenses. Consider setting a dining budget of $400 to optimize your spending."
        financial_summary:
          type: object
          description: Summary of analyzed financial data
          properties:
            total_income:
              type: number
              example: 3500.00
            total_expense:
              type: number
              example: 2100.00
            balance:
              type: number
              example: 1400.00
        insights:
          type: array
          description: List of AI-generated insights
          items:
            type: string
          example:
            - "Your food spending increased 20% compared to previous month"
            - "Transportation costs are higher than your average"
            - "You're saving money better than last month"
        insights_count:
          type: integer
          example: 3
        history_count:
          type: integer
          description: Total number of messages in conversation history
          example: 12
        timestamp:
          type: string
          format: date-time
          example: "2025-03-20T14:30:00Z"

    ConversationMessage:
      type: object
      description: Individual message in conversation history
      properties:
        role:
          type: string
          enum: [user, assistant]
          description: Message sender
          example: "user"
        content:
          type: string
          description: Message text
          example: "Tell me about my spending"
        timestamp:
          type: string
          format: date-time
          example: "2025-03-20T14:30:00Z"
        snapshot:
          type: object
          nullable: true
          description: Financial data snapshot at message time

    ConversationHistory:
      type: object
      description: Complete conversation history with AI advisor
      properties:
        status:
          type: string
          enum: [success]
          example: "success"
        message_count:
          type: integer
          description: Total messages in history
          example: 8
        messages:
          type: array
          description: Array of conversation messages (max 20 turns)
          items:
            $ref: '#/components/schemas/ConversationMessage'
        max_turns:
          type: integer
          description: Maximum conversation turns stored
          example: 20

    MonthlyAnalysisData:
      type: object
      description: Monthly financial analysis
      properties:
        total_income:
          type: number
          description: Total income for current month
          example: 3500.00
        total_expense:
          type: number
          description: Total expenses for current month
          example: 2100.00
        balance:
          type: number
          description: Net balance (income - expense)
          example: 1400.00
        month:
          type: string
          format: date
          description: Month identifier (YYYY-MM)
          example: "2025-03"
        number_of_transactions:
          type: integer
          description: Total transaction count this month
          example: 42
        percentage_transaction_against_last_month:
          type: number
          format: double
          description: Percentage change in transaction count vs previous month
          example: 15.5
        number_of_expense_image:
          type: integer
          description: Count of expenses with attached images
          example: 8
        number_image_against_last_month:
          type: integer
          description: Change in image count vs previous month
          example: 2

    WeeklyDayData:
      type: object
      description: Daily expense summary for weekly analysis
      properties:
        day:
          type: string
          enum: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]
          description: Day of week
          example: "Mon"
        amount:
          type: number
          description: Total expenses for this day
          example: 125.50
        active:
          type: boolean
          description: Is this the current day?
          example: false

    CalendarTransaction:
      type: object
      description: Transaction for calendar view
      properties:
        id:
          type: string
          format: ObjectId
          example: "507f1f77bcf86cd799439013"
        type:
          type: string
          enum: [income, expense]
          example: "expense"
        amount:
          type: number
          example: 35.50
        category:
          type: string
          nullable: true
          example: "Restaurant"
        description:
          type: string
          nullable: true
          example: "Lunch"
        date:
          type: string
          format: date
          example: "2025-03-20"

    ErrorResponse:
      type: object
      properties:
        message: { type: string }


security:
  - bearerAuth: []

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user account
      operationId: registerUser
      description: |
        Create a new user account with provided credentials.
        Automatically returns JWT tokens for immediate authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: "john_doe"
              email: "john.doe@example.com"
              password: "SecurePass123"
      responses:
        201:
          description: User successfully registered with JWT tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                message: "Successfully register a new account"
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: "bearer"
        400:
          description: Validation error - missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Conflict - username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      operationId: loginUser
      description: Authenticate user and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "john_doe"
              password: "SecurePass123"
      responses:
        200:
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      operationId: refreshToken
      description: Obtain new access token using refresh token
      responses:
        200:
          description: New access token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully retrieve new access token via refresh"
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
        401:
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      operationId: getUserProfile
      description: Retrieve authenticated user's profile information
      responses:
        200:
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserProfile'
        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/admin-only:
    get:
      tags:
        - Authentication
      summary: Admin-only endpoint
      operationId: adminOnlyEndpoint
      description: Test endpoint to verify admin role
      responses:
        200:
          description: User has admin role
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        403:
          description: User lacks admin permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # ==================== EXPENSE ====================
  /api/expense/categories:
    get:
      summary: Get all expense categories (grouped)
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of category groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ExpenseCategoryGroup' }

  /api/expense/:
    get:
      summary: Get all expenses of logged-in user
      security:
        - bearerAuth: []
      responses:
        200:
          description: Array of expenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ExpenseOutput' }
    post:
      summary: Create a new expense (JSON)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExpenseInput' }
      responses:
        201:
          description: Expense created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: '#/components/schemas/ExpenseOutput' }
        400: { description: Validation error }

  /api/expense/{id}:
    put:
      summary: Update expense
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id: { type: string }
                amount: { type: number }
                date: { type: string, format: date }
                note: { type: string }
      responses:
        200:
          description: Updated expense
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: '#/components/schemas/ExpenseOutput' }
        403: { description: Permission denied }
        404: { description: Expense not found }
    delete:
      summary: Delete expense
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        200: { description: Deleted successfully }
        403: { description: Forbidden }
        404: { description: Not found }

  /api/expense/image:
    post:
      summary: Create expense with image (multipart/form-data)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category_id, amount, date, image]
              properties:
                category_id: { type: string }
                amount: { type: number }
                date: { type: string, format: date }
                note: { type: string }
                image: { type: string, format: binary }
      responses:
        201:
          description: Expense with image created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: '#/components/schemas/ExpenseOutput' }
    get:
      summary: Get expenses that have an image
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of expenses with image_url
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ExpenseOutput' }

  /api/expense/image/{id}:
    delete:
      summary: Delete expense together with its Cloudinary image
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        200: { description: Deleted expense and image }
        403: { description: Forbidden }
        404: { description: Expense not found }

  # ==================== INCOME ====================
  /api/income/categories:
    get:
      summary: Get all income categories
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/IncomeCategory' }
    post:
      summary: Create income category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        201:
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  id: { type: string }

  /api/income/categories/{id}:
    put:
      summary: Update income category
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        200: { description: Updated }
        404: { description: Category not found }
    delete:
      summary: Delete income category
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        200: { description: Deleted }
        404: { description: Not found }

  /api/income/:
    get:
      summary: Get all incomes of user
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of incomes
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/IncomeOutput' }
    post:
      summary: Create new income
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IncomeInput' }
      responses:
        201:
          description: Income created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: '#/components/schemas/IncomeOutput' }

  /api/income/{id}:
    put:
      summary: Update income
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number }
                date: { type: string, format: date }
                note: { type: string }
      responses:
        200: { description: Updated }
        403: { description: Forbidden }
        404: { description: Income not found }
    delete:
      summary: Delete income
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        200: { description: Deleted }
        403: { description: Forbidden }
        404: { description: Not found }

  # ==================== CHATBOT ====================
  /api/chat/message:
    post:
      summary: Send message to AI chatbot (Gemini)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatMessageRequest' }
      responses:
        200:
          description: AI response with financial insights
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatMessageResponse' }
        400: { description: Missing message }
        500: { description: Gemini API error }

  /api/chat/prompt-preview:
    post:
      summary: Preview prompt and AI response (does NOT save to history)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatMessageRequest' }
      responses:
        200:
          description: Preview result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  final_prompt: { type: string }
                  ai_preview_response: { type: string }
                  financial_summary: { type: object }
                  insights: { type: array }

  /api/chat/history:
    get:
      summary: Get conversation history (max 20 turns)
      security:
        - bearerAuth: []
      responses:
        200:
          description: History messages
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationHistory' }
    delete:
      summary: Clear conversation history
      security:
        - bearerAuth: []
      responses:
        200:
          description: History cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  message: { type: string }

  /api/chat/insights:
    get:
      summary: Get financial insights without chatting
      security:
        - bearerAuth: []
      parameters:
        - { name: months, in: query, schema: { type: integer, default: 3 } }
      responses:
        200:
          description: List of insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  insights: { type: array, items: { type: string } }
                  insights_count: { type: integer }

  /api/chat/financial-debug:
    get:
      summary: Debug raw financial data (no insights)
      security:
        - bearerAuth: []
      parameters:
        - { name: months, in: query, schema: { type: integer, default: 3 } }
      responses:
        200: { description: Full financial data object }
    post:
      summary: Debug with insights
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                months: { type: integer }
      responses:
        200: { description: Financial data + insights }

  /api/chat/health:
    get:
      summary: Health check for chatbot service
      responses:
        200:
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  gemini_configured: { type: boolean }